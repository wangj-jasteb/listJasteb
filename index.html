<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WANG JASTEB | Buy Unchek & Jasteb</title>
    <!-- Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0c111d;
            min-height: 100vh;
            padding: 20px 16px 40px;
            color: #ffffff;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background: linear-gradient(145deg, #f5b042, #f5d742);
            width: 46px;
            height: 46px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(245, 176, 66, 0.25);
        }

        .logo-icon i {
            font-size: 26px;
            color: #0c111d;
        }

        .logo-text {
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #f5d742);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid rgba(245, 215, 66, 0.2);
            font-size: 13px;
            font-weight: 600;
            color: #f5d742;
        }

        /* Tab JASTEB / UNCHEK */
        .tab-container {
            display: flex;
            gap: 8px;
            background: rgba(18, 25, 40, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px;
            border-radius: 60px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 14px 8px;
            font-weight: 700;
            font-size: 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            color: #9aa3b5;
            background: transparent;
            border: none;
        }

        .tab i {
            margin-right: 6px;
        }

        .tab.active {
            background: linear-gradient(135deg, #f5b042, #f5d742);
            color: #0c111d;
            box-shadow: 0 6px 14px rgba(245, 176, 66, 0.3);
        }

        /* Game Selector */
        .game-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .game-card {
            flex: 1;
            background: rgba(20, 28, 45, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 16px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .game-card.active {
            background: rgba(245, 215, 66, 0.08);
            border: 1.5px solid #f5d742;
            box-shadow: 0 6px 15px rgba(245, 176, 66, 0.1);
        }

        .game-icon {
            font-size: 32px;
            margin-bottom: 8px;
            color: #f5d742;
        }

        .game-name {
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.2px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #b1bbce;
            margin-bottom: 8px;
            margin-left: 6px;
        }

        label i {
            margin-right: 8px;
            color: #f5b042;
            width: 18px;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #f5d742;
            pointer-events: none;
            font-size: 16px;
        }

        select, input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(14, 21, 34, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            color: white;
            font-weight: 500;
            font-size: 15px;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            transition: border 0.2s;
        }

        select option {
            background: #121b2a;
            color: white;
            font-weight: 500;
        }

        input {
            padding: 16px 20px;
        }

        input::placeholder {
            color: #5f6c84;
            font-weight: 400;
        }

        select:focus, input:focus {
            border-color: #f5b042;
        }

        /* Price Display */
        .price-tag {
            background: linear-gradient(145deg, #121b2c, #0a1220);
            border-radius: 24px;
            padding: 20px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 18px 0 24px;
            border: 1px solid rgba(245, 215, 66, 0.15);
        }

        .price-label {
            color: #aab6cc;
            font-weight: 500;
            font-size: 16px;
        }

        .price-value {
            font-weight: 800;
            font-size: 32px;
            color: #f5d742;
            letter-spacing: -0.5px;
        }

        .price-value small {
            font-size: 16px;
            font-weight: 500;
            color: #6a7c9e;
        }

        /* Options row */
        .options-row {
            display: flex;
            gap: 14px;
        }

        .options-row .form-group {
            flex: 1;
        }

        /* Buy Button */
        .buy-btn {
            width: 100%;
            padding: 20px 18px;
            background: linear-gradient(135deg, #f5b042, #f5d742);
            border: none;
            border-radius: 60px;
            color: #0c111d;
            font-weight: 800;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 32px;
            box-shadow: 0 14px 30px rgba(245, 176, 66, 0.25);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .buy-btn i {
            font-size: 22px;
        }

        .buy-btn:active {
            transform: scale(0.98);
            box-shadow: 0 8px 18px rgba(245, 176, 66, 0.3);
        }

        /* Footer note */
        .footer-note {
            text-align: center;
            margin-top: 28px;
            color: #65748c;
            font-size: 13px;
            font-weight: 500;
        }

        /* Utility */
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <span class="logo-text">WANG JASTEB</span>
            </div>
            <div class="badge">
                <i class="fas fa-check-circle"></i> Aman
            </div>
        </div>

        <!-- Tab JASTEB / UNCHEK -->
        <div class="tab-container">
            <button class="tab active" id="tabJasteb"><i class="fas fa-fire"></i> JASTEB</button>
            <button class="tab" id="tabUnchek"><i class="fas fa-snowflake"></i> UNCHEK</button>
        </div>

        <!-- Game Cards -->
        <div class="game-selector">
            <div class="game-card active" data-game="ff">
                <div class="game-icon"><i class="fas fa-crosshairs"></i></div>
                <div class="game-name">Free Fire</div>
            </div>
            <div class="game-card" data-game="ml">
                <div class="game-icon"><i class="fas fa-chess-queen"></i></div>
                <div class="game-name">Mobile Legend</div>
            </div>
            <div class="game-card" data-game="pubg">
                <div class="game-icon"><i class="fas fa-drumstick-bite"></i></div>
                <div class="game-name">PUBG</div>
            </div>
        </div>

        <!-- Nominal Selection -->
        <div class="form-group">
            <label><i class="fas fa-tag"></i> Pilih Nominal</label>
            <div class="select-wrapper">
                <select id="nominalSelect"></select>
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>

        <!-- Harga yang harus dibayar -->
        <div class="price-tag">
            <span class="price-label">Total Bayar</span>
            <span class="price-value" id="priceDisplay">Rp 0</span>
        </div>

        <!-- Login & Negara -->
        <div class="options-row">
            <div class="form-group">
                <label><i class="fas fa-sign-in-alt"></i> Login Via</label>
                <div class="select-wrapper">
                    <select id="loginSelect">
                        <option value="Random">Random</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Google">Google</option>
                    </select>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-globe-asia"></i> Negara</label>
                <div class="select-wrapper">
                    <select id="negaraSelect">
                        <option value="Random">Random</option>
                        <option value="Indonesia">Indonesia</option>
                        <option value="Malaysia">Malaysia</option>
                        <option value="Singapura">Singapura</option>
                        <option value="Thailand">Thailand</option>
                        <option value="Vietnam">Vietnam</option>
                        <option value="Filipina">Filipina</option>
                    </select>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>

        <!-- Email Input -->
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Penerima</label>
            <input type="email" id="emailInput" placeholder="nama@email.com" value="">
        </div>

        <!-- Buy Button -->
        <button class="buy-btn" id="buyBtn">
            <i class="fab fa-whatsapp"></i> BELI SEKARANG
        </button>

        <div class="footer-note">
            <i class="fas fa-lock"></i> Transaksi langsung via WhatsApp
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // ---------- DATA HARGA RESS (JASTEB & UNCHEK) ----------
            // JASTEB
            const jastebRess = {
                ff: { 5000:50, 10000:100, 15000:150, 20000:200, 25000:250, 30000:300, 35000:350, 40000:400, 45000:450, 50000:500,
                      55000:550, 60000:600, 65000:650, 70000:700, 75000:750, 80000:800, 85000:850, 90000:900, 95000:950, 100000:1000,
                      150000:1500, 200000:2000, 250000:2500, 300000:3000, 350000:3500, 400000:4000, 450000:4500, 500000:5000 },
                ml: { 5000:25, 10000:50, 15000:75, 20000:100, 25000:125, 30000:150, 35000:175, 40000:200, 45000:225, 50000:250,
                      55000:275, 60000:300, 65000:325, 70000:350, 75000:375, 80000:400, 85000:425, 90000:450, 95000:475, 100000:500,
                      150000:750, 200000:1000, 250000:1250, 300000:1500, 350000:1750, 400000:2000, 450000:2250, 500000:2500 },
                pubg: { 5000:25, 10000:50, 15000:75, 20000:100, 25000:125, 30000:150, 35000:175, 40000:200, 45000:225, 50000:250,
                        55000:275, 60000:300, 65000:325, 70000:350, 75000:375, 80000:400, 85000:425, 90000:450, 95000:475, 100000:500,
                        150000:750, 200000:1000, 250000:1250, 300000:1500, 350000:1750, 400000:2000, 450000:2250, 500000:2500 }
            };

            // UNCHEK
            const unchekRess = {
                ff: { 5000:25, 10000:50, 15000:75, 20000:100, 25000:125, 30000:150, 35000:175, 40000:200, 45000:225, 50000:250,
                      55000:275, 60000:300, 65000:325, 70000:350, 75000:375, 80000:400, 85000:425, 90000:450, 95000:475, 100000:500,
                      150000:750, 200000:1000, 250000:1250, 300000:1500, 350000:1750, 400000:2000, 450000:2250, 500000:2500 },
                ml: { 5000:20, 10000:40, 15000:60, 20000:80, 25000:100, 30000:120, 35000:140, 40000:160, 45000:180, 50000:200,
                      55000:220, 60000:240, 65000:260, 70000:280, 75000:300, 80000:320, 85000:340, 90000:360, 95000:380, 100000:400,
                      150000:600, 200000:800, 250000:1000, 300000:1200, 350000:1400, 400000:1600, 450000:1800, 500000:2000 },
                pubg: { 5000:20, 10000:40, 15000:60, 20000:80, 25000:100, 30000:120, 35000:140, 40000:160, 45000:180, 50000:200,
                        55000:220, 60000:240, 65000:260, 70000:280, 75000:300, 80000:320, 85000:340, 90000:360, 95000:380, 100000:400,
                        150000:600, 200000:800, 250000:1000, 300000:1200, 350000:1400, 400000:1600, 450000:1800, 500000:2000 }
            };

            // State
            let currentType = 'jasteb';
            let currentGame = 'ff';
            
            // DOM Elements
            const tabJasteb = document.getElementById('tabJasteb');
            const tabUnchek = document.getElementById('tabUnchek');
            const gameCards = document.querySelectorAll('.game-card');
            const nominalSelect = document.getElementById('nominalSelect');
            const priceDisplay = document.getElementById('priceDisplay');
            const emailInput = document.getElementById('emailInput');
            const loginSelect = document.getElementById('loginSelect');
            const negaraSelect = document.getElementById('negaraSelect');
            const buyBtn = document.getElementById('buyBtn');

            // Daftar nominal rupiah
            function generateNominalList() {
                let list = [];
                for (let i = 5000; i <= 100000; i += 5000) list.push(i);
                for (let i = 150000; i <= 500000; i += 50000) list.push(i);
                return list;
            }
            const allNominals = generateNominalList();

            function formatRupiah(angka) {
                return 'Rp ' + angka.toLocaleString('id-ID');
            }

            function updateUI() {
                const source = currentType === 'jasteb' ? jastebRess : unchekRess;
                const gameData = source[currentGame];
                
                nominalSelect.innerHTML = '';
                
                allNominals.forEach(nominal => {
                    if (gameData.hasOwnProperty(nominal)) {
                        const ress = gameData[nominal];
                        const option = document.createElement('option');
                        option.value = nominal;
                        option.textContent = `${formatRupiah(nominal)} = ${ress.toLocaleString()} Ress`;
                        nominalSelect.appendChild(option);
                    }
                });
                
                updatePriceDisplay();
            }

            function updatePriceDisplay() {
                const selectedNominal = parseInt(nominalSelect.value);
                priceDisplay.textContent = formatRupiah(selectedNominal);
            }

            // Event: Tab
            tabJasteb.addEventListener('click', () => {
                tabJasteb.classList.add('active');
                tabUnchek.classList.remove('active');
                currentType = 'jasteb';
                updateUI();
            });
            tabUnchek.addEventListener('click', () => {
                tabUnchek.classList.add('active');
                tabJasteb.classList.remove('active');
                currentType = 'unchek';
                updateUI();
            });

            // Event: Game
            gameCards.forEach(card => {
                card.addEventListener('click', () => {
                    gameCards.forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    const game = card.dataset.game;
                    currentGame = game;
                    updateUI();
                });
            });

            nominalSelect.addEventListener('change', updatePriceDisplay);

            function getGameName() {
                if (currentGame === 'ff') return 'Free Fire';
                if (currentGame === 'ml') return 'Mobile Legend';
                return 'PUBG';
            }

            // Mendapatkan jumlah ress berdasarkan pilihan saat ini
            function getCurrentRess() {
                const nominal = parseInt(nominalSelect.value);
                const source = currentType === 'jasteb' ? jastebRess : unchekRess;
                return source[currentGame][nominal] || 0;
            }

            // Buy -> WhatsApp (FORMAT BARU)
            buyBtn.addEventListener('click', () => {
                const nominalRupiah = parseInt(nominalSelect.value);
                const nominalK = (nominalRupiah / 1000) + 'K';
                const ressAmount = getCurrentRess();
                
                const gameName = getGameName();
                const typeName = currentType === 'jasteb' ? 'Jasteb' : 'Unchek';
                
                let email = emailInput.value.trim();
                if (!email) {
                    alert('Masukkan email tujuan, Bos!');
                    return;
                }
                if (!email.includes('@') || !email.includes('.')) {
                    alert('Format email kurang tepat.');
                    return;
                }

                const loginMethod = loginSelect.value;
                const negara = negaraSelect.value;

                // Format baru sesuai permintaan
                const message = `Jenis Game : ${gameName}%0A` +
                                `Jenis Pembelian : ${typeName}%0A` +
                                `Harga : ${nominalK}%0A` +
                                `Ress : ${ressAmount}%0A` +
                                `Email : ${email}%0A` +
                                `Login : ${loginMethod}%0A` +
                                `Negara : ${negara}`;

                const phoneNumber = '6283150287016';
                const waLink = `https://wa.me/${phoneNumber}?text=${message}`;
                window.open(waLink, '_blank');
            });

            // Inisialisasi
            updateUI();
            emailInput.placeholder = 'wangjasteb@gmail.com';
        })();
    </script>
</body>
</html>
